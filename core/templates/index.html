{% extends 'base.html' %}
{% block content %}
<script src="https://www.cbr-xml-daily.ru/money.js"></script>

    <div class="container">
    <h2>Автобусы</h2>
    <input id="myInput" type="text" placeholder="Найти..">
    <br>         
    <table class="table table-bordered table-striped table_sort">
                <thead>
                    <tr>
                        <th class="sort">id</th>
                        <th class="sort">Номер заказа</th>
                        <th class="sort">Стоимость $</th>
                        <th class="sort">Стоимость ₽</th>
                        <th class="sort">Срок поставки</th>
                    </tr>
                </thead>
                <tbody id="myTable">
                {% for value in values.items %}
                <tr>
                    <th>{{value.id}}</th>
                    <th>{{value.order}}</th>
                    <td>{{value.dollar}}</td>
                    <td>fx({{value.dollar}}).from("USD").to("RUB");</td>
                    <td>{{value.supply}}</td>
                {% endfor %}
                </tr>
            </tbody>
    </table>
  </div>



{% endblock %}
